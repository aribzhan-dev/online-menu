version: '3.8'

services:
  web:
    build: ../..
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data: